# Bot Executor Service Configuration

# Kafka Broker
broker.server="localhost:9092"
broker.server=${?BROKER_SERVER}

# Topics
broker.topic.bot-messages="ripple-bot-messages"
broker.topic.bot-messages=${?BROKER_TOPIC_BOT_MESSAGES}
broker.topic.message="ripple-messages"
broker.topic.message=${?BROKER_TOPIC_MESSAGE}
broker.topic.push-messages="ripple-push-messages"
broker.topic.push-messages=${?BROKER_TOPIC_PUSH_MESSAGES}

# Consumer Group
ripple.topic.bot-executor.group.id="ripple-bot-executor-group"
ripple.topic.bot-executor.group.id=${?RIPPLE_TOPIC_BOT_EXECUTOR_GROUP_ID}
ripple.topic.bot-executor.client.id="ripple-bot-executor-client"
ripple.topic.bot-executor.client.id=${?RIPPLE_TOPIC_BOT_EXECUTOR_CLIENT_ID}

# Kafka Consumer Tuning
kafka.consumer.max-poll-records=50
kafka.consumer.max-poll-records=${?KAFKA_CONSUMER_MAX_POLL_RECORDS}
kafka.consumer.fetch-min-bytes=1
kafka.consumer.fetch-min-bytes=${?KAFKA_CONSUMER_FETCH_MIN_BYTES}
kafka.consumer.fetch-max-wait-ms=500
kafka.consumer.fetch-max-wait-ms=${?KAFKA_CONSUMER_FETCH_MAX_WAIT_MS}

# Worker Thread Pool
bot-executor.worker.core-size=50
bot-executor.worker.core-size=${?BOT_EXECUTOR_WORKER_CORE_SIZE}
bot-executor.worker.max-size=200
bot-executor.worker.max-size=${?BOT_EXECUTOR_WORKER_MAX_SIZE}
bot-executor.worker.queue-capacity=1000
bot-executor.worker.queue-capacity=${?BOT_EXECUTOR_WORKER_QUEUE_CAPACITY}

# Webhook Configuration
bot-executor.webhook.max-retries=3
bot-executor.webhook.max-retries=${?BOT_EXECUTOR_WEBHOOK_MAX_RETRIES}
bot-executor.webhook.retry-base-delay-ms=1000
bot-executor.webhook.retry-base-delay-ms=${?BOT_EXECUTOR_WEBHOOK_RETRY_BASE_DELAY_MS}
bot-executor.webhook.retry-multiplier=2.0
bot-executor.webhook.retry-multiplier=${?BOT_EXECUTOR_WEBHOOK_RETRY_MULTIPLIER}

# SSE Configuration
bot-executor.sse.timeout-seconds=300
bot-executor.sse.timeout-seconds=${?BOT_EXECUTOR_SSE_TIMEOUT_SECONDS}

# Pending Message Configuration
bot-executor.pending-message.ttl-seconds=600
bot-executor.pending-message.ttl-seconds=${?BOT_EXECUTOR_PENDING_MESSAGE_TTL_SECONDS}

# Cassandra Configuration
cassandra.contact-points="localhost:9042"
cassandra.contact-points=${?CASSANDRA_CONTACT_POINTS}
cassandra.keyspace-name=ripple
cassandra.keyspace-name=${?CASSANDRA_KEYSPACE_NAME}
cassandra.local-datacenter=datacenter1
cassandra.local-datacenter=${?CASSANDRA_LOCAL_DATACENTER}

# Redis Configuration
redis.host="localhost"
redis.host=${?REDIS_HOST}
redis.port=6379
redis.port=${?REDIS_PORT}
